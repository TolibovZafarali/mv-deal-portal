<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#101010;padding:24px 12px;margin:0;">
  <tr>
    <td align="center">
      <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;width:100%;background:#101010;border:1px solid #3a3a3a;">
        <tr>
          <td align="center" style="padding:28px 24px 12px;">
            <img src="cid:mv-logo-white" alt="MV Deal Portal" width="180" style="display:block;width:180px;max-width:100%;height:auto;border:0;" />
          </td>
        </tr>

        <tr>
          <td style="padding:0 24px;">
            <div style="height:1px;line-height:1px;font-size:0;background:#3a3a3a;">&nbsp;</div>
          </td>
        </tr>

        <tr>
          <td align="center" style="padding:20px 24px 8px;color:#f2f2f2;text-align:center;font-family:'Carme',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
            <table role="presentation" width="520" cellspacing="0" cellpadding="0" align="center" style="width:100%;max-width:520px;margin:0 auto;">
              <tr>
                <td align="center" style="text-align:center;">
                  <h1 style="margin:0 0 12px;font-size:28px;line-height:1.25;font-weight:500;color:#f2f2f2;">{{title}}</h1>
                  <p style="margin:0 0 12px;font-size:16px;line-height:1.65;color:#b8b8b8;">{{message}}</p>
                  <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#b8b8b8;">{{expiry_note}}</p>

                  <table role="presentation" cellspacing="0" cellpadding="0" align="center" style="margin:0 auto 22px;">
                    <tr>
                      <td align="center" bgcolor="#f2f2f2" style="border:1px solid #f2f2f2;background:#f2f2f2;">
                        <a href="{{action_url}}" style="display:inline-block;min-width:276px;padding:14px 22px;box-sizing:border-box;color:#101010;text-decoration:none;font-size:14px;font-weight:600;letter-spacing:0.02em;text-align:center;">
                          {{action_text}}
                        </a>
                      </td>
                    </tr>
                  </table>

                  <p style="margin:0 0 8px;font-size:13px;line-height:1.6;color:#b8b8b8;">If the button doesn't work, use this link:</p>
                  <p style="margin:0 0 28px;font-size:13px;line-height:1.6;word-break:break-all;">
                    <a href="{{action_url}}" style="color:#f2f2f2;text-decoration:underline;">{{action_url}}</a>
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <tr>
          <td align="center" style="padding:16px 24px 24px;border-top:1px solid #3a3a3a;color:#b8b8b8;font-size:12px;line-height:1.6;text-align:center;font-family:'Carme',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
            {{footer_text}}
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
