<tr>
  <td align="center" class="mv-font mv-light" style="padding:20px 24px 8px;text-align:center;">
    <table role="presentation" width="520" cellspacing="0" cellpadding="0" align="center" style="width:100%;max-width:520px;margin:0 auto;">
      <tr>
        <td align="center" style="text-align:center;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" align="center" style="margin:0 auto 18px;border:1px solid #2e2e2e;background:linear-gradient(180deg,#161616 0%,#101010 100%);">
            <tr>
              <td align="left" style="padding:18px 20px 0;">
                <span style="display:inline-block;padding:6px 12px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#111111;background:#f2f2f2;border:1px solid #f2f2f2;font-weight:700;">Just Published</span>
              </td>
            </tr>
            <tr>
              <td align="left" style="padding:14px 20px 6px;">
                <h1 style="margin:0;font-size:30px;line-height:1.2;font-weight:600;color:#f2f2f2;letter-spacing:0.01em;">{{title}}</h1>
              </td>
            </tr>
            <tr>
              <td align="left" style="padding:0 20px 16px;">
                <p class="mv-muted" style="margin:0;font-size:15px;line-height:1.7;color:#c2c2c2;">{{message}}</p>
              </td>
            </tr>
            <tr>
              <td align="left" style="padding:0 20px 20px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border:1px solid #3a3a3a;background:#151515;">
                  <tr>
                    <td style="padding:14px 16px;border-bottom:1px solid #2a2a2a;">
                      <p class="mv-muted" style="margin:0 0 3px;font-size:11px;line-height:1.4;letter-spacing:0.1em;text-transform:uppercase;color:#9f9f9f;">Address</p>
                      <p style="margin:0;font-size:15px;line-height:1.55;color:#f2f2f2;font-weight:500;">{{property_address}}</p>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:14px 16px;">
                      <p class="mv-muted" style="margin:0 0 3px;font-size:11px;line-height:1.4;letter-spacing:0.1em;text-transform:uppercase;color:#9f9f9f;">List Price</p>
                      <p style="margin:0;font-size:23px;line-height:1.3;color:#f2f2f2;font-weight:600;">{{property_price}}</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:0 20px 22px;">
                <table role="presentation" cellspacing="0" cellpadding="0" align="center" style="margin:0 auto;">
                  <tr>
                    <td align="center" bgcolor="#f2f2f2" style="border:1px solid #f2f2f2;background:#f2f2f2;">
                      <a href="{{action_url}}" style="display:inline-block;min-width:276px;padding:14px 22px;box-sizing:border-box;color:#101010;text-decoration:none;font-size:14px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;text-align:center;">
                        {{action_text}}
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>

          <p class="mv-muted" style="margin:0 0 8px;font-size:13px;line-height:1.6;color:#b8b8b8;">If the button doesn't work, use this link:</p>
          <p style="margin:0 0 28px;font-size:13px;line-height:1.6;word-break:break-all;">
            <a href="{{action_url}}" style="color:#f2f2f2;text-decoration:underline;">{{action_url}}</a>
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>
