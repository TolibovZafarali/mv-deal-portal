<tr>
  <td align="center" class="mv-font mv-light" style="padding:20px 24px 8px;text-align:center;">
    <table role="presentation" width="520" cellspacing="0" cellpadding="0" align="center" style="width:100%;max-width:520px;margin:0 auto;">
      <tr>
        <td align="center" style="text-align:center;">
          <h1 style="margin:0 0 12px;font-size:28px;line-height:1.25;font-weight:500;color:#f2f2f2;">{{title}}</h1>
          <p class="mv-muted" style="margin:0 0 12px;font-size:16px;line-height:1.65;color:#b8b8b8;">{{message}}</p>
          <p class="mv-muted" style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#b8b8b8;">{{expiry_note}}</p>

          <table role="presentation" cellspacing="0" cellpadding="0" align="center" style="margin:0 auto 22px;">
            <tr>
              <td align="center" bgcolor="#f2f2f2" style="border:1px solid #f2f2f2;background:#f2f2f2;">
                <a href="{{action_url}}" style="display:inline-block;min-width:276px;padding:14px 22px;box-sizing:border-box;color:#101010;text-decoration:none;font-size:14px;font-weight:600;letter-spacing:0.02em;text-align:center;">
                  {{action_text}}
                </a>
              </td>
            </tr>
          </table>

          <p class="mv-muted" style="margin:0 0 8px;font-size:13px;line-height:1.6;color:#b8b8b8;">If the button doesn't work, use this link:</p>
          <p style="margin:0 0 28px;font-size:13px;line-height:1.6;word-break:break-all;">
            <a href="{{action_url}}" style="color:#f2f2f2;text-decoration:underline;">{{action_url}}</a>
          </p>
        </td>
      </tr>
    </table>
  </td>
</tr>
