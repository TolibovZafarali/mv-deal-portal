substitutions:
  _SERVICE_NAME: mv-deal-backend
  _REGION: us-central1
  _AR_REPOSITORY: mv-deal-portal
  _IMAGE_NAME: backend
  _CLOUDSQL_INSTANCE: CHANGE_ME
  _DB_NAME: megnarealestate
  _DB_USER: root
  _RUN_SERVICE_ACCOUNT: mv-deal-backend-run@megna-real-estate-backend.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - -f
      - backend/Dockerfile
      - backend

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

  - id: render-env-prod
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        sed -i "s|__DB_NAME__|${_DB_NAME}|g" infra/cloudrun/env-prod.yaml
        sed -i "s|__DB_USER__|${_DB_USER}|g" infra/cloudrun/env-prod.yaml
        sed -i "s|__CLOUDSQL_INSTANCE__|${_CLOUDSQL_INSTANCE}|g" infra/cloudrun/env-prod.yaml

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=${_RUN_SERVICE_ACCOUNT}
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --set-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest
      - --env-vars-file=infra/cloudrun/env-prod.yaml

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
