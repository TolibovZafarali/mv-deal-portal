substitutions:
  _SERVICE_NAME: mv-deal-backend
  _REGION: us-central1
  _AR_REPOSITORY: mv-deal-portal
  _IMAGE_NAME: backend
  _CLOUDSQL_INSTANCE: CHANGE_ME
  _DB_NAME: megnarealestate
  _DB_USER: root
  _RUN_SERVICE_ACCOUNT: mv-deal-backend-run@megna-real-estate-backend.iam.gserviceaccount.com
  _GCS_BUCKET_NAME: CHANGE_ME
  _PHOTO_PUBLIC_BASE_URL: https://img.megna-realestate.com

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - -f
      - backend/Dockerfile
      - backend

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=${_RUN_SERVICE_ACCOUNT}
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --set-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest
      - --set-env-vars=SPRING_PROFILES_ACTIVE=prod,SPRING_DATASOURCE_URL=jdbc:mysql:///${_DB_NAME}?cloudSqlInstance=${_CLOUDSQL_INSTANCE}&socketFactory=com.google.cloud.sql.mysql.SocketFactory,DB_USERNAME=${_DB_USER}
      - --update-env-vars=^##^APP_PHOTOS_PROVIDER=gcs##GCS_BUCKET_NAME=${_GCS_BUCKET_NAME}##APP_PHOTOS_PUBLIC_BASE_URL=${_PHOTO_PUBLIC_BASE_URL}##APP_PHOTOS_MAX_FILE_SIZE_BYTES=10485760##APP_PHOTOS_ALLOWED_CONTENT_TYPES=image/jpeg,image/png,image/webp##APP_PHOTOS_UPLOAD_URL_TTL_SECONDS=900##APP_PHOTOS_PURGE_GRACE_DAYS=30

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
