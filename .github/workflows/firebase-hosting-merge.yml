name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    # Optional but smart: only run if frontend changed
    paths:
      - "frontend/**"
      - ".github/workflows/firebase-hosting-merge.yml"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - run: npm ci
      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MRE_FRONTEND }}
          channelId: live
          projectId: mre-frontend
          entryPoint: frontend