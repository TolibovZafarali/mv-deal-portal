name: Deploy to Firebase Hosting on PR
on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/**"

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      # Optional: pin Node
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: 20

      - run: npm ci
      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MRE_FRONTEND }}
          projectId: mre-frontend
          entryPoint: frontend