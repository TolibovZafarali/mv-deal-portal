spring:
  application:
    name: backend
  config:
    import: optional:file:./app.env[.properties],optional:file:./backend/app.env[.properties]
  datasource:
    url: jdbc:mysql://localhost:3306/megnarealestate?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
app:
  auth:
    password-reset-url-base: ${APP_AUTH_PASSWORD_RESET_URL_BASE:http://localhost:5173/reset-password}
    password-reset-token-ttl-minutes: ${APP_AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
    refresh-token-ttl-minutes: ${APP_AUTH_REFRESH_TOKEN_TTL_MINUTES:20160}
    refresh-cookie-name: ${APP_AUTH_REFRESH_COOKIE_NAME:mv_refresh_token}
    refresh-cookie-domain: ${APP_AUTH_REFRESH_COOKIE_DOMAIN:}
    refresh-cookie-path: ${APP_AUTH_REFRESH_COOKIE_PATH:/api/auth}
    refresh-cookie-secure: ${APP_AUTH_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:megna-backend}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:60}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://megna-realestate.com,https://www.megna-realestate.com}
  abuse-protection:
    enabled: ${APP_ABUSE_PROTECTION_ENABLED:true}

  admin:
    bootstrap:
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
  photos:
    provider: ${APP_PHOTOS_PROVIDER:gcs}
    bucket: ${GCS_BUCKET_NAME:}
    public-base-url: ${APP_PHOTOS_PUBLIC_BASE_URL:}
    max-file-size-bytes: ${APP_PHOTOS_MAX_FILE_SIZE_BYTES:10485760}
    allowed-content-types: ${APP_PHOTOS_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
    upload-url-ttl-seconds: ${APP_PHOTOS_UPLOAD_URL_TTL_SECONDS:900}
    purge-grace-days: ${APP_PHOTOS_PURGE_GRACE_DAYS:30}
    max-purge-retries: ${APP_PHOTOS_MAX_PURGE_RETRIES:5}
    purge-cron: "${APP_PHOTOS_PURGE_CRON:0 15 2 * * *}"
  address-autocomplete:
    endpoint-url: ${ADDRESS_AUTOCOMPLETE_ENDPOINT_URL:https://nominatim.openstreetmap.org/search}
    user-agent: ${ADDRESS_AUTOCOMPLETE_USER_AGENT:mv-deal-portal/1.0}
    country-codes: ${ADDRESS_AUTOCOMPLETE_COUNTRY_CODES:us}
    default-limit: ${ADDRESS_AUTOCOMPLETE_DEFAULT_LIMIT:6}
    max-limit: ${ADDRESS_AUTOCOMPLETE_MAX_LIMIT:10}
    timeout-ms: ${ADDRESS_AUTOCOMPLETE_TIMEOUT_MS:2500}
  email:
    enabled: ${APP_EMAIL_ENABLED:false}
    production: ${APP_EMAIL_PRODUCTION:false}
    from-address: ${APP_EMAIL_FROM_ADDRESS:no-reply@megna-realestate.com}
    reply-to-address: ${APP_EMAIL_REPLY_TO_ADDRESS:contact@megna-realestate.com}
    non-production-allowlist: ${APP_EMAIL_NON_PROD_ALLOWLIST:}
    webhooks-enabled: ${APP_EMAIL_WEBHOOKS_ENABLED:false}
    webhook-secret: ${POSTMARK_WEBHOOK_SECRET:}
    postmark-api-base-url: ${POSTMARK_API_BASE_URL:https://api.postmarkapp.com}
    postmark-server-token: ${POSTMARK_SERVER_TOKEN:}
    postmark-message-stream: ${POSTMARK_MESSAGE_STREAM:outbound}
  contact:
    general-inbox: ${APP_CONTACT_GENERAL_INBOX:contact@megna-realestate.com}
    investor-inbox: ${APP_CONTACT_INVESTOR_INBOX:contact@megna-realestate.com}
    seller-inbox: ${APP_CONTACT_SELLER_INBOX:contact@megna-realestate.com}
    privacy-inbox: ${APP_CONTACT_PRIVACY_INBOX:privacy@megna-realestate.com}
  features:
    seller-threads-enabled: ${APP_FEATURES_SELLER_THREADS_ENABLED:false}

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
