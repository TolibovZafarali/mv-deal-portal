spring:
  application:
    name: backend
  config:
    import: optional:file:./app.env
  datasource:
    url: jdbc:mysql://localhost:3306/megnarealestate?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:megna-backend}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:60}

  admin:
    bootstrap:
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
  uploads:
    property-photos-dir: ${PROPERTY_PHOTOS_DIR:uploads/property-photos}
    property-photos-url-prefix: ${PROPERTY_PHOTOS_URL_PREFIX:/uploads/property-photos}
    max-file-size-bytes: ${PROPERTY_PHOTO_MAX_FILE_SIZE_BYTES:10485760}
  address-autocomplete:
    endpoint-url: ${ADDRESS_AUTOCOMPLETE_ENDPOINT_URL:https://nominatim.openstreetmap.org/search}
    user-agent: ${ADDRESS_AUTOCOMPLETE_USER_AGENT:mv-deal-portal/1.0}
    country-codes: ${ADDRESS_AUTOCOMPLETE_COUNTRY_CODES:us}
    default-limit: ${ADDRESS_AUTOCOMPLETE_DEFAULT_LIMIT:6}
    max-limit: ${ADDRESS_AUTOCOMPLETE_MAX_LIMIT:10}
    timeout-ms: ${ADDRESS_AUTOCOMPLETE_TIMEOUT_MS:2500}
